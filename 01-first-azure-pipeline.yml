trigger:
- master

pool:
  vmImage: ubuntu-latest

jobs:
- job: job1
  steps:
  - script: echo "Job 1 - Hello, world!"
    displayName: 'Run Job 1'

- job: job2
  steps:
  - script: echo "Job 2 - Hello, world!"
    displayName: 'Run Job 2'
